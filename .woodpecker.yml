labels:
  platform: darwin/arm64
  type: exec

steps:
  setup:
    commands:
      - echo "===> Setting up build environment..."
      - mkdir -p build
      - echo "===> Build environment is ready."

  static-analysis:
    commands:
      - echo "===> Running Static Analysis..."
      - ./env/venv/bin/python3 Tools/check_domain_purity.py
      - bash Tools/lint_layer_markers.sh
      # 忽略修复文件头脚本，防止 CI 运行修改文件导致 git diff
      # - ./env/venv/bin/python3 Tools/refactor_file_headers.py

  generate-project:
    commands:
      - echo "===> Generating Xcode Project via XcodeGen..."
      - xcodegen generate

  build-ios:
    commands:
      - echo "===> Building for iOS Simulator..."
      - xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO > build/ios_build.log 2>&1
      - echo "===> iOS Build completed successfully."

  run-tests:
    commands:
      - echo "===> Running Unit Tests..."
      - xcodebuild test -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'platform=iOS Simulator,name=iPhone 17 Pro' > build/test_results.log 2>&1
      - echo "===> All Tests passed successfully."
