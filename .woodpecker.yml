labels:
  platform: darwin/arm64
  backend: local

skip_clone: true

steps:
  clone-repo:
    image: bash
    commands:
      - echo "machine localhost login $CI_NETRC_USERNAME password $CI_NETRC_PASSWORD" > ~/.netrc
      - export CLONE_URL=$(echo $CI_REPO_CLONE_URL | sed 's/gitea:3000/localhost:3000/g')
      - git clone $CLONE_URL .
      - git checkout $CI_COMMIT_SHA

  setup:
    image: bash
    commands:
      - echo "===> Setting up build environment..."
      - mkdir -p build
      - python3 -m venv ./env/venv
      - brew install xcbeautify 2>/dev/null || echo "xcbeautify already installed"
      - echo "===> Build environment is ready."

  static-analysis:
    image: bash
    commands:
      - echo "===> Running Static Analysis..."
      - ./env/venv/bin/python3 Tools/check_domain_purity.py
      - bash Tools/lint_layer_markers.sh

  generate-project:
    image: bash
    commands:
      - echo "===> Generating Xcode Project via XcodeGen..."
      - xcodegen generate

  build-ios:
    image: bash
    commands:
      - echo "===> Building for iOS Simulator..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/ios_build.log
      - echo "===> iOS Build completed successfully."

  build-macos:
    image: bash
    commands:
      - echo "===> Building for macOS (Catalyst)..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYuMac -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/mac_build.log
      - echo "===> macOS Build completed successfully."

  build-watchos:
    image: bash
    commands:
      - echo "===> Building for watchOS Simulator..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYuWatch -destination 'generic/platform=watchOS Simulator' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/watch_build.log
      - echo "===> watchOS Build completed successfully."

  count-tests:
    image: bash
    commands:
      - echo "===> Counting test cases..."
      - grep -r "^    func test" Tests/ --include="*.swift" | wc -l | tr -d ' ' > build/.test_count
      - echo "===> Test count: $(cat build/.test_count)"

  run-tests:
    image: bash
    commands:
      - echo "===> Running Unit Tests..."
      - set -o pipefail && xcodebuild test -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'platform=iOS Simulator,name=iPhone 17 Pro' 2>&1 | tee build/test_raw.log | Tools/ci-test-progress.sh | xcbeautify --report junit --report-path build/test_report.junit
      - echo "===> All Tests passed successfully."
