labels:
  backend: local

skip_clone: true

# 禁止新推送中断已在执行的流水线
cancel_previous_pipeline_events: []

steps:
  clone-repo:
    image: bash
    commands:
      - echo "machine localhost login $CI_NETRC_USERNAME password $CI_NETRC_PASSWORD" > ~/.netrc
      - export CLONE_URL=$(echo $CI_REPO_CLONE_URL | sed 's|http://[^/]*:3000|http://localhost:3000|g')
      - |
        if git rev-parse --git-dir > /dev/null 2>&1; then
          echo "📦 已有仓库，增量 fetch..."
          git fetch origin
          git reset --hard $CI_COMMIT_SHA
        else
          echo "📥 首次克隆..."
          find . -maxdepth 1 -not -name '.' -exec rm -rf {} \; 2>/dev/null || true
          git clone $CLONE_URL .
          git checkout $CI_COMMIT_SHA
        fi
      - |
        if git diff --name-only HEAD~1 2>/dev/null | grep -qE "project.yml|Package.resolved"; then
          echo "🧹 依赖配置变更，清空 DerivedData..."
          rm -rf build/DerivedData-*
        fi

  # ── Stage 1: 并行（静态分析 ∥ Lint ∥ 安全 ∥ 构建准备）──
  static-analysis:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Running Static Analysis..."
      - echo "--- 架构依赖检查 (L0-L3 严格分层) ---"
      - python3 Tools/Gatekeeper/check_architecture_dependency.py
      - echo "--- 领域纯净度检查 ---"
      - python3 Tools/Gatekeeper/check_domain_purity.py
      - echo "--- DI 测试设置审计 ---"
      - python3 Tools/Gatekeeper/check_test_di_setup.py
      - echo "--- 根目录卫生检查 (临时文件 + 结构) ---"
      - python3 Tools/Gatekeeper/check_root_hygiene.py
      - echo "--- 魔鬼数字/字符串审计 ---"
      - python3 Tools/Gatekeeper/check_magic_numbers_v2.py
      - echo "--- 分层标记检查 ---"
      - bash Tools/Lint/lint_layer_markers.sh
      - 'echo "===> Scanning unsafe String.Index offsetBy: calls..."'
      - python3 Tools/Lint/scan_unsafe_string_index.py
      - echo "--- 文档完整性检查 ---"
      - python3 Tools/Gatekeeper/check_docs_integrity.py
      - echo "--- 配置与脚本健康检查 ---"
      - python3 Tools/Gatekeeper/check_configs_integrity.py
      - echo "--- ShellCheck ---"
      - bash Tools/CI/run_shellcheck.sh
      - echo "--- SPM 完整性校验 ---"
      - bash Tools/CI/verify_spm_integrity.sh
      - echo "--- SBOM 生成 ---"
      - python3 Tools/CI/generate_sbom.py
      - brew install syft 2>/dev/null || true
      - syft . -o cyclonedx-json=build/syft.cdx.json 2>/dev/null || echo "Syft 不可用，跳过 license 检测"
      - python3 Tools/CI/merge_sbom.py

  swiftlint:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Running SwiftLint..."
      - swiftlint --reporter github-actions-logging 2>/dev/null || swiftlint || true
    failure: ignore

  signature-check:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Verifying commit signature..."
      - |
        if git log --show-signature -1 | grep -q "Good signature"; then
          echo "✅ Commit signed"
        else
          echo "⚠️  Commit NOT signed — 请配置 GPG: git config commit.gpgsign true"
        fi
    failure: ignore

  secret-scan:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Scanning for hardcoded secrets..."
      - python3 Tools/Gatekeeper/check_hardcoded_secrets.py

  prepare:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Generating Xcode project..."
      - xcodegen generate
      - echo "===> Preparing build environment + dependencies..."
      - mkdir -p build /Users/constantine/.cache/zhiyu-spm
      - set -o pipefail && xcodebuild build-for-testing -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'generic/platform=iOS Simulator' -clonedSourcePackagesDirPath /Users/constantine/.cache/zhiyu-spm CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/test_compile.log
      - echo "===> Preparation complete."

  # ── Stage 3: 三平台并行编译 ──
  build-ios:
    depends_on: [prepare]
    image: bash
    commands:
      - echo "===> Building iOS app..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'generic/platform=iOS Simulator' -derivedDataPath build/DerivedData-ios -clonedSourcePackagesDirPath /Users/constantine/.cache/zhiyu-spm CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/ios_build.log
      - echo "===> iOS Build completed."

  build-macos:
    depends_on: [prepare]
    image: bash
    commands:
      - echo "===> Building macOS (Catalyst) app..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYuMac -destination 'platform=macOS' -derivedDataPath build/DerivedData-macos -clonedSourcePackagesDirPath /Users/constantine/.cache/zhiyu-spm CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/mac_build.log
      - echo "===> macOS Build completed."

  build-watchos:
    depends_on: [prepare]
    image: bash
    commands:
      - echo "===> Building watchOS app..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYuWatch -destination 'generic/platform=watchOS Simulator' -derivedDataPath build/DerivedData-watchos -clonedSourcePackagesDirPath /Users/constantine/.cache/zhiyu-spm CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/watch_build.log
      - echo "===> watchOS Build completed."

  # ── Stage 4: 测试 + 覆盖率 ──
  test:
    depends_on: [build-ios, build-macos, build-watchos]
    image: bash
    commands:
      - echo "===> Counting test cases..."
      - grep -r "^    func test" Tests/ --include="*.swift" | wc -l | tr -d ' ' > build/.test_count
      - ./Tools/CI/run_unit_tests.sh --ci
      - echo "===> All Tests passed."
      - echo "===> Checking code coverage..."
      - python3 Tools/CI/check_coverage.py
