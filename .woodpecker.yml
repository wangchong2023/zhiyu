labels:
  backend: local

skip_clone: true

steps:
  clone-repo:
    image: bash
    commands:
      - echo "machine localhost login $CI_NETRC_USERNAME password $CI_NETRC_PASSWORD" > ~/.netrc
      # 将 Docker 内部主机名替换为 localhost，确保本地 agent 可访问 Gitea
      - export CLONE_URL=$(echo $CI_REPO_CLONE_URL | sed 's|http://[^/]*:3000|http://localhost:3000|g')
      # 清理持久化工作空间残留文件，避免 git clone 因目录非空而失败
      - find . -maxdepth 1 -not -name '.' -exec rm -rf {} \; 2>/dev/null || true
      - git clone $CLONE_URL .
      - git checkout $CI_COMMIT_SHA

  # ── Stage 1: 并行（静态分析 ∥ Lint ∥ 安全 ∥ 构建准备）──
  static-analysis:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Running Static Analysis..."
      - python3 Tools/Gatekeeper/check_domain_purity.py
      - python3 Tools/Gatekeeper/check_test_di_setup.py
      - bash Tools/Lint/lint_layer_markers.sh
      - 'echo "===> Scanning unsafe String.Index offsetBy: calls..."'
      - python3 Tools/Lint/scan_unsafe_string_index.py

  swiftlint:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Running SwiftLint..."
      - swiftlint --reporter github-actions-logging 2>/dev/null || swiftlint || true
    failure: ignore

  secret-scan:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Scanning for hardcoded secrets..."
      - python3 Tools/Gatekeeper/check_hardcoded_secrets.py

  prepare:
    depends_on: [clone-repo]
    image: bash
    commands:
      - echo "===> Generating Xcode project..."
      - xcodegen generate
      - echo "===> Preparing build environment + dependencies..."
      - mkdir -p build $HOME/.cache/zhiyu-spm
      - set -o pipefail && xcodebuild build-for-testing -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'generic/platform=iOS Simulator' -clonedSourcePackagesDirPath $HOME/.cache/zhiyu-spm CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/test_compile.log
      - echo "===> Preparation complete."

  # ── Stage 3: 三平台并行编译 ──
  build-ios:
    depends_on: [prepare]
    image: bash
    commands:
      - echo "===> Building iOS app..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'generic/platform=iOS Simulator' -derivedDataPath build/DerivedData-ios -clonedSourcePackagesDirPath $HOME/.cache/zhiyu-spm CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/ios_build.log
      - echo "===> iOS Build completed."

  build-macos:
    depends_on: [prepare]
    image: bash
    commands:
      - echo "===> Building macOS (Catalyst) app..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYuMac -destination 'platform=macOS' -derivedDataPath build/DerivedData-macos -clonedSourcePackagesDirPath $HOME/.cache/zhiyu-spm CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/mac_build.log
      - echo "===> macOS Build completed."

  build-watchos:
    depends_on: [prepare]
    image: bash
    commands:
      - echo "===> Building watchOS app..."
      - set -o pipefail && xcodebuild build -project ZhiYu.xcodeproj -scheme ZhiYuWatch -destination 'generic/platform=watchOS Simulator' -derivedDataPath build/DerivedData-watchos -clonedSourcePackagesDirPath $HOME/.cache/zhiyu-spm CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build/watch_build.log
      - echo "===> watchOS Build completed."

  # ── Stage 4: 测试 + 覆盖率 ──
  test:
    depends_on: [build-ios, build-macos, build-watchos]
    image: bash
    commands:
      - echo "===> Counting test cases..."
      - grep -r "^    func test" Tests/ --include="*.swift" | wc -l | tr -d ' ' > build/.test_count
      - echo "===> Running Unit Tests..."
      - set -o pipefail && xcodebuild test -project ZhiYu.xcodeproj -scheme ZhiYu -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -derivedDataPath build/DerivedData-ios -clonedSourcePackagesDirPath $HOME/.cache/zhiyu-spm -enableCodeCoverage YES -parallel-testing-enabled YES -parallel-testing-worker-count 4 -skip-testing:ZhiYuUITests/ZhiYuUITests/testChatAISkeletonLoadingState -skip-testing:ZhiYuUITests/IngestTests/testManualEntrySectionExists -skip-testing:ZhiYuUITests/IngestTests/testURLImportButton 2>&1 | tee build/test_raw.log | Tools/CI/ci-test-progress.sh | xcbeautify --report junit --report-path build/test_report.junit
      - echo "===> All Tests passed."
      - echo "===> Checking code coverage..."
      - python3 Tools/CI/check_coverage.py
