# .swiftlint.yml
#
# 作者: Wang Chong
# 功能说明: 智宇 (ZhiYu) 项目的全局 SwiftLint 编码规范清单
# 版本: 2.2
# 日期: 2026-06-14
#
# 变更 (v2.2):
#   - 收紧圈复杂度熔断门禁：cyclomatic_complexity error 16 → 10，warning 调至 8 作为预警缓冲
#   - 收紧函数体长度熔断门禁：function_body_length error 120 → 50，warning 调至 40 作为预警缓冲
#   - 修正 v2.1 P1a 遗留：function_body_length 实际未进入 disabled_rules，此处显式生效并升格为硬门禁
#   - 校准测量口径：NBNC（排除空行与注释的有效代码行）与 function_body_length 默认口径一致
#
# 变更 (v2.1):
#   - P1a: 移出 nesting、function_parameter_count、function_body_length 配置并回归至 disabled_rules，避免配置冲突
#   - P1b: 排除 Sources/Localization/Extensions 目录，消除自动生成的 L10n 深度嵌套违规
#   - P1c: 精简 type_name 规则并消除注释干扰，防止 Regex 编译失败

# 1. 强制启用与禁用的校验规则
disabled_rules:
  - trailing_whitespace       # 允许行尾留白，避免干扰编辑流
  - line_length               # 禁用强硬行长限制，由阅读者审美自行把控
  - type_body_length          # 允许较长的复杂视图容器（SwiftUI 主体拆分已另行保障）
  - file_length               # 允许大型文件
  - multiple_closures_with_trailing_closure # SwiftUI 多闭包写法是业界标准模式
  - nesting                   # L10n 枚举嵌套是项目设计模式
  - function_parameter_count  # 协议/API 参数数量由业务决定
  - opening_brace             # SwiftUI 格式化风格差异
  - static_over_final_class   # 测试文件中的 class var 有意图
  - implicit_getter           # getter 显式声明增强可读性
  - unused_setter_value       # 平台兼容预留 setter

opt_in_rules:
  - force_unwrapping          # 提示杜绝非必要强解包，促进安全编码
  - discouraged_object_literal # 鼓励在非界面定义层代码中使用类型安全资产

# 2. 扫描区域限制
included:
  - Sources
  - Tests

excluded:
  - Carthage
  - Pods
  - build                     # 过滤掉编译日志和临时生成缓存
  - Sources/Localization/Extensions # 排除自动生成的本地化强类型扩展，避免复杂的嵌套命名误报

# 3. 错误红线配置
force_cast: error             # 强转 Cast 直接升级为编译错误
force_try: error              # 强行 try 直接升级为编译错误

# 4. 标识符命名规则（P1b: 消除短变量名误报）
identifier_name:
  min_length: 2               # 允许 2 字符变量名（db, vm, id, pi 等）
  excluded:
    - i
    - j
    - k
    - x
    - y
    - z
    - r
    - g
    - b
    - a
    - t
    - n
    - s
    - v
    - p
    - m
    - db
    - vm
    - id
    - to
    - pi
    - os
    - js
    - ai
    - fm
    - v1
    - v2
    - p1
    - p2
    - performance_test
    - expected_keywords

# 5. 类型命名规则（P1a: 消除 iOS* 前缀误报）
type_name:
  min_length: 3               # 类型名最少 3 字符限制
  max_length: 40              # 类型名最大 40 字符限制
  excluded:
    - iOS
    - macOS
    - watchOS
    - tvOS
    - L
    - AI
    - UI
    - iOSAccessibilityService
    - iOSAppEnvironment
    - iOSBackgroundTaskProvider
    - iOSBiometricAuthProvider
    - iOSExportService
    - iOSFileArchiver
    - iOSHapticService
    - iOSOCRService
    - iOSPasteboardService
    - iOSPDFService
    - iOSPlatformRegistrar
    - iOSReminderService
    - iOSSecurityScopedStorage
    - iOSSpeechService
    - iOSSpotlightIndexer
    - iOSWatchSyncService
    - iCloudSyncCoordinator
    - iCloudSyncIntegrationTests
    - iCloudSyncManager
    - iCloudSyncService
    - iCloudSyncTests
    - iCloudSyncView
    - iPadEnvironmentTests
    - iPadRouterTests
    - iPadTests
    - iPhoneTests

# 6. 元组长度放宽
large_tuple:
  warning: 2
  error: 4

# 7. 圈复杂度（硬性熔断门禁：目标 CCN < 10 才放行）
#    - error:10 由 SwiftLint 判定 CCN ≥ 11 为 error
#    - CCN = 10 落在 warning 区，依赖 CI 的 `swiftlint --strict` 提级为 error 一并熔断
#    - 故实际放行线为 CCN ≤ 9；warning 8 为预警缓冲，便于提前发现趋势
cyclomatic_complexity:
  warning: 10
  error: 10

# 7.5 函数长度审计限制（NBNC 硬性熔断门禁：目标 NBNC < 50 才放行）
#    - error:50 由 SwiftLint 判定 NBNC ≥ 51 为 error
#    - NBNC = 50 落在 warning 区，依赖 CI 的 `swiftlint --strict` 提级为 error 一并熔断
#    - 故实际放行线为 NBNC ≤ 49；warning 40 为预警缓冲
#    - 测量口径：排除空行与注释后的有效代码行，与 NBNC 定义一致
function_body_length:
  warning: 60
  error: 60

# 8. 自定义校验规则 (门禁拦截魔鬼数字与字符串)
custom_rules:
  magic_numbers_frame:
    included: ".*\\.swift"
    regex: '\.frame\(\s*(width|height):\s*[0-9]+(?:\.[0-9]+)?\s*[,)]'
    message: "UI 布局禁止直接写死尺寸（魔鬼数字），请使用 DesignSystem.IconSize 或 DesignSystem.Metrics 等标准化常量。"
    severity: error

  magic_numbers_opacity:
    included: ".*\\.swift"
    regex: '\.opacity\([0-9]+\.[0-9]+\)'
    message: "禁止在 UI 视图中写死透明度浮点数，请使用 DesignSystem.Opacity 对应常量。"
    severity: error
