# 6. 嵌套规则（P1c: 放宽类型嵌套深度）
nesting:
  type_level: 3               # 允许 3 层嵌套（SwiftUI 视图 + 常量枚举）

# 7. 函数参数数量（放宽协议定义和 Logger 参数上限）
function_parameter_count:
  warning: 8
  error: 15

# 8. 元组/函数体长度放宽
large_tuple:
  warning: 2
  error: 4

function_body_length:
  warning: 100
  error: 150

# 9. 圈复杂度（放宽以避免过度拆分异步流处理函数）
cyclomatic_complexity:
  warning: 10
  error: 16