name: ZhiYu
packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.2
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.29.1
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: 4.4.3
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19

options:
  bundleIdPrefix: com.zhiyu.app
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2,4"
    INFOPLIST_FILE: Sources/Info.plist
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_GENERATE_LOCALIZATION_SYMBOL_KEYS: NO
    EAGER_COMPILATION_ENABLED: NO
    MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
    FRAMEWORK_SEARCH_PATHS: $(inherited) $(PROJECT_DIR)/Frameworks

targets:
  ZhiYu:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Platforms/macOS/**"
          - "Platforms/watchOS/**"
          - "Platforms/iOS/Widgets/**"
          - "MacInfo.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhiyu.app
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-iOS
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
        CODE_SIGN_ENTITLEMENTS: Sources/ZhiYu.entitlements
        NSSupportsLiveActivities: YES
        SWIFT_OBJC_BRIDGING_HEADER: Sources/App/ZhiYu-Bridging-Header.h
    preBuildScripts:
      - script: "./env/venv/bin/python3 Tools/check_domain_purity.py"
        name: "[Gatekeeper] Domain Purity Check"
        basedOnDependencyAnalysis: false
      - script: "./env/venv/bin/python3 Tools/check_localization.py"
        name: "[Gatekeeper] L10n Leak & Hardcode Audit"
        basedOnDependencyAnalysis: false
      - script: "./env/venv/bin/python3 Tools/check_storage_constants.py"
        name: "[Gatekeeper] Storage Constants Audit"
        basedOnDependencyAnalysis: false
    dependencies:
      - package: GRDB
      - package: Lottie
      - package: ZIPFoundation
      - target: ZhiYuWidgets
      - framework: Frameworks/WechatOpenSDK.xcframework
      - framework: Frameworks/ATAuthSDK_D.xcframework

  ZhiYuMac:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "Platforms/watchOS/**"
          - "Platforms/iOS/Widgets/**"
          - "Info.plist"
          - "Base.lproj/**"
          - "LaunchScreen.storyboard"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhiyu.app.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-iOS
        INFOPLIST_FILE: Sources/MacInfo.plist
        SUPPORTS_MACCATALYST: "YES"
        SDKROOT: iphoneos
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
        SWIFT_OBJC_BRIDGING_HEADER: Sources/App/ZhiYu-Bridging-Header.h
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_ENTITLEMENTS: ""
        Release:
          CODE_SIGN_ENTITLEMENTS: Sources/ZhiYu.entitlements
    preBuildScripts:
      - script: "./env/venv/bin/python3 Tools/check_domain_purity.py"
        name: "[Gatekeeper] Domain Purity Check"
        basedOnDependencyAnalysis: false
      - script: "./env/venv/bin/python3 Tools/check_localization.py"
        name: "[Gatekeeper] L10n Leak & Hardcode Audit"
        basedOnDependencyAnalysis: false
      - script: "./env/venv/bin/python3 Tools/check_storage_constants.py"
        name: "[Gatekeeper] Storage Constants Audit"
        basedOnDependencyAnalysis: false
    dependencies:
      - package: GRDB
      - package: Lottie
      - package: ZIPFoundation

  ZhiYuWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources
        excludes:
          - "App/**"
          - "Platforms/iOS/**"
          - "Platforms/macOS/**"
          - "Features/AI/**/View/**"
          - "Features/AI/**/Coordinator/**"
          - "Features/AI/Chat/Model/AIWorkflowStore.swift"
          - "Features/AI/Chat/Model/AIInsightStore.swift"
          - "Features/AI/Synthesis/**"
          - "Features/Knowledge/**/View/**"
          - "Features/Knowledge/**/Coordinator/**"
          - "Features/Knowledge/NotebookHub/ViewModel/NotebookHubViewModel.swift"
          - "Features/Insight/**/View/**"
          - "Features/Insight/**/Coordinator/**"
          - "Features/System/**/View/**"
          - "Features/AI/AIViewProvider.swift"
          - "Features/Knowledge/KnowledgeViewProvider.swift"
          - "Features/Insight/InsightViewProvider.swift"
          - "Features/System/SystemViewProvider.swift"
          - "Shared/UIComponents/Menus/UserProfileMenu.swift"
          - "Shared/UIComponents/Navigation/AdaptiveSidebarView.swift"
          - "Shared/UIComponents/Navigation/NavigateAction.swift"
          - "Shared/UIComponents/Overlays/**"
          - "Shared/UIComponents/Pickers/**"
          - "Shared/UIComponents/Editors/**"
          - "Shared/UIComponents/Badges/AIRainbowGlowBadge.swift"
          - "Shared/UIComponents/Interaction/KeyboardShortcutsView.swift"
          - "Shared/UIComponents/Modifiers/AppToolbarModifier.swift"
          - "Shared/UIComponents/Feedback/AppAILoadingSkeleton.swift"
          - "Shared/UIComponents/Feedback/AppLottieView.swift"
          - "Shared/UIComponents/Feedback/AppTooltip.swift"
          - "Shared/UIComponents/Feedback/TooltipManager.swift"
          - "Shared/DesignSystem/Styles/SynthesisStore+UI.swift"
          - "Platforms/watchOS/WatchContentView.swift"
          - "Infrastructure/Storage/Sync/iCloudSyncCoordinator.swift"
          - "Info.plist"
          - "MacInfo.plist"
          - "Base.lproj/**"
          - "LaunchScreen.storyboard"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhiyu.app.watch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Watch
        SDKROOT: watchos
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_WKWatchKitApp: YES
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
    preBuildScripts:
      - script: "./env/venv/bin/python3 Tools/check_domain_purity.py"
        name: "[Gatekeeper] Domain Purity Check"
        basedOnDependencyAnalysis: false
      - script: "./env/venv/bin/python3 Tools/check_localization.py"
        name: "[Gatekeeper] L10n Leak & Hardcode Audit"
        basedOnDependencyAnalysis: false
      - script: "./env/venv/bin/python3 Tools/check_storage_constants.py"
        name: "[Gatekeeper] Storage Constants Audit"
        basedOnDependencyAnalysis: false
    dependencies:
      - package: GRDB
      - package: ZIPFoundation

  ZhiYuWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Platforms/iOS/Widgets
      - path: Sources/Platforms/iOS/Activity/AIProcessingAttributes.swift
      - path: Sources/Core/Base/Constants/AppConstants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhiyu.app.widgets
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: WIDGET
        INFOPLIST_FILE: Sources/Platforms/iOS/Widgets/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        NSSupportsLiveActivities: YES
        CODE_SIGN_ENTITLEMENTS: Sources/ZhiYuWidgets.entitlements
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        SDKROOT: iphoneos
        SKIP_INSTALL: "YES"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: GRDB

  ZhiYuTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - "UITests/**"
          - "UI/**"
          - "Platforms/Watch*.swift"
      - path: Sources
        includes:
          - "Platforms/watchOS/WatchWatchSyncService.swift"
          - "Platforms/watchOS/WatchOCRService.swift"
          - "Platforms/watchOS/WatchPDFService.swift"
          - "Platforms/watchOS/WatchPasteboardService.swift"
          - "Platforms/watchOS/WatchSpeechService.swift"
          - "Platforms/iOS/Widgets/KnowledgeStatsWidget.swift"
          - "Core/Base/Constants/AppConstants.swift"
    dependencies:
      - target: ZhiYu
      - package: SnapshotTesting

  ZhiYuUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UITests
      - path: Tests/UI
    dependencies:
      - target: ZhiYu
      - package: SnapshotTesting

  ZhiYuWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: Tests
        includes:
          - "Platforms/WatchPlatformTests.swift"
          - "Platforms/WatchSyncTests.swift"
          - "Platforms/WatchViewTests.swift"
          - "Shared/TestMocks.swift"
    dependencies:
      - target: ZhiYuWatch

  ZhiYuMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
        includes:
          - "Platforms/MacPlatformTests.swift"
      - path: Sources
        includes:
          - "Platforms/macOS/MacFileArchiver.swift"
          - "Platforms/macOS/MacOSPlatformCapabilities.swift"
          - "Platforms/macOS/MacPasteboardService.swift"
          - "Core/Base/Protocols/PasteboardProtocol.swift"
          - "Core/Base/Protocols/FileArchiverProtocol.swift"
          - "Core/Base/Protocols/PlatformCapabilities.swift"
          - "Core/Base/Constants/AppConstants.swift"

schemes:
  ZhiYu:
    build:
      targets:
        ZhiYu: all
    test:
      targets:
        - ZhiYuTests
        - ZhiYuUITests
    run:
      executable: ZhiYu
  
  ZhiYuMac:
    build:
      targets:
        ZhiYuMac: all
    run:
      executable: ZhiYuMac
  
  ZhiYuMacTests:
    build:
      targets:
        ZhiYuMacTests: all
    test:
      targets:
        - ZhiYuMacTests
  
  ZhiYuWatch:
    build:
      targets:
        ZhiYuWatch: all
    test:
      targets:
        - ZhiYuWatchTests
    run:
      executable: ZhiYuWatch
