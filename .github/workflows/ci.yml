# ci.yml
#
# 作者: Wang Chong
# 功能说明: 智宇 (ZhiYu) 全自动持续集成流水线
#          快速静态检查 → 构建测试 → 覆盖率红线 → 多平台编译验证
# 版本: 2.0
# 日期: 2026-06-07
#
# 变更 (v2.0):
#   - 重排执行顺序：快速检查（SPM/Lint/安全）优先于耗时的构建测试
#   - 去冗余：Fastlane 仅负责测试，不再重复执行 SwiftLint
#   - 补全：主流水线新增硬编码密钥扫描 + 本地化强制检查
#   - 多平台：新增 macOS / watchOS 编译验证，防止跨平台破坏性变更
#   - 命名：步骤名称与实际执行内容严格对齐

name: ZhiYu CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    name: CI — Lint → Test → Coverage → Multi-Platform
    runs-on: macos-14

    steps:
      # ── 1. 检出代码仓库 ─────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. 挂载 Xcode 环境 ──────────────────────────────────────────
      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      # ── 3. 安装构建工具链 ───────────────────────────────────────────
      - name: Install Build Toolchain
        run: |
          brew install xcodegen swiftlint

      # ── 4. 生成 Xcode 工程 ──────────────────────────────────────────
      - name: Generate Xcode Project
        run: |
          xcodegen generate

      # ── 5. SPM 依赖安全审计（快速，阻断已知风险依赖）───────────────
      - name: Audit SPM Dependencies
        run: |
          python3 Tools/CI/audit_spm_dependencies.py

      # ── 6. SwiftLint 严格模式（--strict：所有 warning → error）─────
      - name: Run SwiftLint Strict Analysis
        run: |
          swiftlint lint --strict --reporter github-actions-logging

      # ── 7. 硬编码密钥扫描（阻断 API Key / Token / 密码泄露）────────
      - name: Scan for Hardcoded Secrets
        run: |
          python3 Tools/Gatekeeper/check_hardcoded_secrets.py

      # ── 8. 本地化合规检查（阻断硬编码中文 / 直接 tr() 调用）────────
      - name: Check Localization Compliance
        run: |
          python3 Tools/Gatekeeper/check_localization.py

      # ── 9. 构建 + 单元测试 + 覆盖率收集（快速反馈）─────────────────
      - name: Build and Unit Test with Coverage
        run: |
          xcodebuild test \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYu \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -only-testing:ZhiYuTests \
            -enableCodeCoverage YES \
            -derivedDataPath build/DerivedData \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 4 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee build/test_output.log
          TEST_EXIT=${PIPESTATUS[0]}
          if [ ${TEST_EXIT} -ne 0 ]; then
            echo "❌ 单元测试失败 (exit=${TEST_EXIT})"
            exit ${TEST_EXIT}
          fi

      # ── 10. UI 测试（并行多 Worker，独立阶段）───────────────────────
      - name: Run UI Tests (Parallel)
        run: |
          xcodebuild test-without-building \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYu \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -only-testing:ZhiYuUITests \
            -enableCodeCoverage YES \
            -derivedDataPath build/DerivedData \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 4 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee build/ui_test_output.log
          UI_EXIT=${PIPESTATUS[0]}
          if [ ${UI_EXIT} -ne 0 ]; then
            echo "❌ UI 测试失败 (exit=${UI_EXIT})"
            exit ${UI_EXIT}
          fi

      # ── 11. 代码覆盖率红线熔断（Domain 层 ≥ 85%）──────────────────
      - name: Enforce Code Coverage Threshold
        run: |
          python3 Tools/CI/check_coverage.py

      # ── 12. 多平台编译验证（确保非 iOS target 可编译）──────────────
      - name: Verify Multi-Platform Build
        run: |
          echo "🔨 验证 iOS 设备构建..."
          xcodebuild build \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYu \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | tail -5

          echo "🔨 验证 macOS 构建..."
          xcodebuild build \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYuMac \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | tail -5

          echo "🔨 验证 watchOS 构建..."
          xcodebuild build \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYuWatch \
            -destination 'generic/platform=watchOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | tail -5

          echo "✅ 全平台编译验证通过"
