# ci.yml
#
# 作者: Wang Chong
# 功能说明: 智宇 (ZhiYu) 全自动持续集成流水线
#          快速静态检查 → 构建测试 → 覆盖率红线 → 多平台编译验证
# 版本: 3.0
# 日期: 2026-06-14
#
# 变更 (v3.0):
#   - Xcode 15.4 → latest-stable（匹配 Swift 6 严格并发要求）
#   - macOS runner: macos-14 → macos-15（Xcode 16+ 仅支持最新 macOS）
#   - 多平台构建改为矩阵并行，缩短总耗时约 40%
#   - 新增测试产物上传（.xcresult + 原始日志），失败时保留现场
#   - Monkey 测试显式跳过（本质不稳定，不适合 CI）
# 变更 (v2.0):
#   - 重排执行顺序：快速检查（SPM/Lint/安全）优先于耗时的构建测试
#   - 去冗余：Fastlane 仅负责测试，不再重复执行 SwiftLint
#   - 补全：主流水线新增硬编码密钥扫描 + 本地化强制检查
#   - 多平台：新增 macOS / watchOS 编译验证，防止跨平台破坏性变更
#   - 命名：步骤名称与实际执行内容严格对齐

name: ZhiYu CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Stage 1: 代码质量快速检查 ───────────────────────────────────────
  lint-and-audit:
    name: Lint & Audit
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Build Toolchain
        run: |
          brew install xcodegen swiftlint

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Audit SPM Dependencies
        run: python3 Tools/CI/audit_spm_dependencies.py

      - name: Run SwiftLint Strict Analysis
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: Scan for Hardcoded Secrets
        run: python3 Tools/Gatekeeper/check_hardcoded_secrets.py

      - name: Check Localization Compliance
        run: python3 Tools/Gatekeeper/check_localization.py

      - name: Check Architecture Dependencies (L0-L3)
        run: python3 Tools/Gatekeeper/check_architecture_dependency.py

      - name: Check Domain Purity
        run: python3 Tools/Gatekeeper/check_domain_purity.py

      - name: Audit Magic Numbers & Strings
        run: python3 Tools/Gatekeeper/check_magic_numbers_v2.py

      - name: Check Root Hygiene (Temp Files + Structure)
        run: python3 Tools/Gatekeeper/check_root_hygiene.py

      - name: Check Test DI Setup
        run: python3 Tools/Gatekeeper/check_test_di_setup.py

  # ── Stage 2: 构建 + 单元测试 + 覆盖率 ────────────────────────────────
  test:
    name: Build & Unit Test
    needs: lint-and-audit
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Build Toolchain
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run Unit Tests with Coverage
        run: |
          chmod +x Tools/CI/run_unit_tests.sh
          ./Tools/CI/run_unit_tests.sh

      - name: Enforce Code Coverage Threshold
        run: python3 Tools/CI/check_coverage.py

      - name: Upload Test Results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: |
            build/test_raw.log
            build/test_report.junit
            build/DerivedData-ios/Logs/Test/*.xcresult

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage_report.txt

  # ── Stage 3: UI 测试（独立阶段）──────────────────────────────────────
  ui-test:
    name: UI Tests
    needs: lint-and-audit
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Build Toolchain
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run UI Tests (Parallel)
        run: |
          chmod +x Tools/CI/run_ui_tests.sh
          ./Tools/CI/run_ui_tests.sh

      - name: Upload UI Test Results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ui
          path: |
            build/ui_test_output.log
            build/DerivedData/Logs/Test/*.xcresult

  # ── Stage 4: 多平台编译验证（矩阵并行）───────────────────────────────
  multi-platform:
    name: Build ${{ matrix.platform }}
    needs: lint-and-audit
    runs-on: macos-15
    strategy:
      matrix:
        platform:
          - scheme: ZhiYu
            destination: 'generic/platform=iOS Simulator'
            name: iOS
          - scheme: ZhiYuMac
            destination: 'platform=macOS'
            name: macOS
          - scheme: ZhiYuWatch
            destination: 'generic/platform=watchOS Simulator'
            name: watchOS
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Build Toolchain
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build ${{ matrix.platform.name }}
        run: |
          xcodebuild build \
            -project ZhiYu.xcodeproj \
            -scheme '${{ matrix.platform.scheme }}' \
            -destination '${{ matrix.platform.destination }}' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tail -30
