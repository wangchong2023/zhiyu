# security-scan.yml
#
# 作者: Wang Chong
# 功能说明: 智宇 (ZhiYu) 纵深安全扫描流水线
#          在主 CI（每次 push）之上提供额外的深度检查 + 多平台编译验证
#          每周一定时运行，也可手动触发
# 版本: 3.0
# 日期: 2026-06-14
#
# 变更 (v3.0):
#   - macOS runner: macos-latest → macos-15（匹配 Xcode 16+ 要求）
#   - Xcode 固定 latest-stable，信任最新稳定版本
# 变更 (v2.0):
#   - 新增 xcodegen generate（修复构建验证因缺少工程文件而失败的问题）
#   - 新增 macOS / watchOS 编译验证
#   - 保留密钥扫描 + 本地化检查作为纵深防御（主 CI 已包含，此处为第二道防线）

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # 每周一凌晨 2 点
  workflow_dispatch:      # 允许手动触发

jobs:
  security-audit:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Install Build Toolchain
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: Scan for Hardcoded Secrets
        run: |
          echo "🔍 扫描硬编码密钥/Token/IP..."
          python3 Tools/Gatekeeper/Release/check_hardcoded_secrets.py

      - name: Check Localization Compliance
        run: |
          echo "🔍 扫描硬编码中文和违规 tr() 调用..."
          python3 Tools/Gatekeeper/Compliance/check_localization.py

      - name: Audit SPM Dependencies
        run: |
          echo "🔍 审计 SPM 依赖安全版本..."
          python3 Tools/CI/Analyze/audit_spm_dependencies.py

      - name: Verify iOS Build
        run: |
          echo "🔨 验证 iOS 设备构建..."
          xcodebuild build \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYu \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tail -5

      - name: Verify macOS Build
        run: |
          echo "🔨 验证 macOS 构建..."
          xcodebuild build \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYuMac \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tail -5

      - name: Verify watchOS Build
        run: |
          echo "🔨 验证 watchOS 构建..."
          xcodebuild build \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYuWatch \
            -destination 'generic/platform=watchOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tail -5

      - name: Build with Warnings as Errors (trial)
        run: |
          echo "🔨 严格编译模式 (warnings-as-errors)..."
          xcodebuild build \
            -project ZhiYu.xcodeproj \
            -scheme ZhiYu \
            -destination 'generic/platform=iOS Simulator' \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee build/warnings_as_errors.log || true
          echo "警告数 (trial, not blocking): $(grep -c 'warning:' build/warnings_as_errors.log 2>/dev/null || echo 0)"
        continue-on-error: true

      - name: Verify Reproducible Build
        run: |
          echo "🔨 验证确定性构建 (Reproducible Build)..."
          bash Tools/CI/Analyze/verify_reproducible_build.sh

      - name: Security Audit Complete
        run: |
          echo "✅ 纵深安全扫描全部通过"
