apiVersion: ssu/v1
nlu:
  shortcuts:
    bundleIdentifier: com.km.app
    intents:
    - metadata:
        name: CaptureIntent_0
        title: 在智元中记录
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }用 ${+applicationName} 记录'
          - '{${+prefix} }在 ${+applicationName} 中记下'
        - locale: Base
          utterances:
          - 用 ${+applicationName} 记录
          - 在 ${+applicationName} 中记下
        - locale: zh-Hans
          utterances:
          - 用 ${+applicationName} 记录
          - 在 ${+applicationName} 中记下
    - metadata:
        name: SearchWikiIntent_1
        title: 在智元中搜索
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }在 ${+applicationName} 中搜索'
          - '{${+prefix} }${+applicationName} 搜索'
        - locale: Base
          utterances:
          - 在 ${+applicationName} 中搜索
          - ${+applicationName} 搜索
        - locale: zh-Hans
          utterances:
          - 在 ${+applicationName} 中搜索
          - ${+applicationName} 搜索
    - metadata:
        name: GetWikiStatsIntent_2
        title: 查看智元统计
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+applicationName} 统计'
          - '{${+prefix} }${+applicationName} 概览'
        - locale: Base
          utterances:
          - ${+applicationName} 统计
          - ${+applicationName} 概览
        - locale: zh-Hans
          utterances:
          - ${+applicationName} 统计
          - ${+applicationName} 概览
    - metadata:
        name: +negative
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
        - locale: Base
          utterances: []
        - locale: zh-Hans
          utterances: []
variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
    - KM
  - locale: Base
    synomyms:
    - KM
  - locale: zh-Hans
    synomyms:
    - KM
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
